<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Voting Results (Admin Only)</h2>

<table>
<tr>
    <th>Candidate</th>
    <th>Votes</th>
</tr>

{% for row in results %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
</tr>
{% endfor %}

</table>

<a href="/logout">Logout</a>

</body>
</html>
